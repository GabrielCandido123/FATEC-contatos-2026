<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/app.js" defer type="module"></script>
    <link rel="stylesheet" href="css/style.css" />
    <title>Contatos</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="index.html">Cadastrar Contato</a>
          </li>
          <li>
            <a href="contatos.html">Listagem de Contatos</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <h1>Cadastro de Contato</h1>
      <div class="registration-content">
        <div class="image-container">
          <span class="image-label">Escolha sua foto de perfil</span>
          <div class="image-preview">
            <img
              id="preview-image"
              src="https://img.freepik.com/psd-gratuitas/renderizacao-3d-do-estilo-de-cabelo-para-o-design-do-avatar_23-2151869121.jpg"
              alt="Preview da Imagem"
            />
          </div>
          <label for="preview-input" class="btn-upload">Selecionar Foto</label>
          <input type="file" id="preview-input" accept="image/*" hidden />
        </div>

        <form
          class="form-container"
          aria-label="Formulário de Contato"
          method="POST"
        >
          <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite seu nome completo"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="celular">Celular</label>
            <input
              type="tel"
              id="celular"
              name="celular"
              placeholder="(XX) XXXXX-XXXX"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu e-mail"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input
              type="text"
              id="endereco"
              name="endereco"
              placeholder="Rua, número, bairro"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input
              type="text"
              id="cidade"
              name="cidade"
              placeholder="Digite sua cidade"
              required
              aria-required="true"
            />
          </div>
          <button type="submit" class="btn-submit">Salvar Contato</button>
        </form>
      </div>
    </main>
  </body>
</html>
