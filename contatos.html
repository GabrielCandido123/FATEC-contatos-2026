<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Contatos</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/app.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="index.html">Cadastrar Contato</a>
          </li>
          <li>
            <a href="contatos.html">Listagem de Contatos</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="container">
      <section class="contacts-section">
        <h2>Contatos Cadastrados</h2>
        <div class="load-contacts">
          <button class="btn-get">Carregar Contatos</button>
        </div>
        <div id="contacts-list">
          <!-- exemplo de exibição de um contato cadastrado-->
          <div class="contact-card-style">
            <h3>Maria Silva</h3>
            <img src="https://placehold.co/600x400" alt="imagem do contato" />
            <p><strong>Id:</strong> 1</p>
            <p><strong>Celular:</strong> (11) 99999-9999</p>
            <p><strong>E-mail:</strong> maria@email.com</p>
            <p><strong>Endereço:</strong> Rua A, 100</p>
            <p><strong>Cidade:</strong> São Paulo</p>
            <div class="card-actions">
              <button class="btn-action btn-put">Editar Contato</button>
              <button class="btn-action btn-delete">Excluir Contato</button>
            </div>
          </div>
          <div class="contact-card-style">
            <h3>Maria Silva</h3>
            <img src="https://placehold.co/600x400" alt="imagem do contato" />
            <p><strong>Id:</strong> 1</p>
            <p><strong>Celular:</strong> (11) 99999-9999</p>
            <p><strong>E-mail:</strong> maria@email.com</p>
            <p><strong>Endereço:</strong> Rua A, 100</p>
            <p><strong>Cidade:</strong> São Paulo</p>
            <div class="card-actions">
              <button class="btn-action btn-put">Editar Contato</button>
              <button class="btn-action btn-delete">Excluir Contato</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
